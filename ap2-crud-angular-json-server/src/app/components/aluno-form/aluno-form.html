<div class="card">
  <h2>Cadastro de Alunos</h2>

  <form (ngSubmit)="salvar()">

    <div class="campo">
      <label>Nome</label>
      <input
        type="text"
        [(ngModel)]="aluno.nome"
        name="nome"
        required
      />
    </div>

    <div class="campo">
      <label>Idade</label>
      <input
        type="number"
        [(ngModel)]="aluno.idade"
        name="idade"
        required
      />
    </div>

    <div class="campo">
      <label>Curso</label>
      <input
        type="text"
        [(ngModel)]="aluno.curso"
        name="curso"
        required
      />
    </div>

    <div class="checkbox">
      <input
        type="checkbox"
        [(ngModel)]="aluno.formado"
        name="formado"
      />
      <label>Formado</label>
    </div>

    <button type="submit">
      Salvar Aluno
    </button>

  </form>
</div>
